<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Браузерная Игра</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="container">
    <!-- ВКЛАДКИ -->
    <div class="tabs">
      <button class="tab-button active" data-tab="game"><i class="fas fa-gamepad"></i> Игра</button>
      <button class="tab-button" data-tab="stats"><i class="fas fa-chart-bar"></i> Характеристики</button>
      <button class="tab-button" data-tab="inventory"><i class="fas fa-backpack"></i> Инвентарь</button>
      <button class="tab-button" data-tab="equipment"><i class="fas fa-tshirt"></i> Экипировка</button>
      <button class="tab-button" data-tab="skills"><i class="fas fa-book-open"></i> Умения</button>
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div class="main-content">
      <!-- ЦЕНТРАЛЬНАЯ ПАНЕЛЬ -->
      <div class="center-panel">
        <!-- ВКЛАДКА ИГРА -->
        <div id="game-tab" class="tab-content active">
          <!-- Канвас 900×507 -->
          <div style="margin-bottom: 2px;">
            <canvas id="game-canvas" width="900" height="507" style="display: block; background: #1a1a2e;"></canvas>
          </div>
          
          <!-- Кнопки направлений -->
          <div class="buttons-container">
            <div class="directions-grid">
              <button id="north-btn" class="dir-btn"><i class="fas fa-arrow-up"></i> Север</button>
              <button id="up-btn" class="dir-btn"><i class="fas fa-angle-double-up"></i> Вверх</button>
              <button id="down-btn" class="dir-btn"><i class="fas fa-angle-double-down"></i> Вниз</button>
              <button id="south-btn" class="dir-btn"><i class="fas fa-arrow-down"></i> Юг</button>
              <button id="west-btn" class="dir-btn"><i class="fas fa-arrow-left"></i> Запад</button>
              <button id="east-btn" class="dir-btn"><i class="fas fa-arrow-right"></i> Восток</button>
            </div>
          </div>
        </div>

        <!-- ДРУГИЕ ВКЛАДКИ -->
        <div id="stats-tab" class="tab-content card">
          <h2><i class="fas fa-chart-bar"></i> Характеристики</h2>
          <div id="stats-content"></div>
        </div>
        
        <div id="inventory-tab" class="tab-content card">
          <h2><i class="fas fa-backpack"></i> Инвентарь</h2>
          <div id="inventory-content"></div>
        </div>
        
        <div id="equipment-tab" class="tab-content card">
          <h2><i class="fas fa-tshirt"></i> Экипировка</h2>
          <div id="equipment-content"></div>
        </div>
        
        <div id="skills-tab" class="tab-content card">
          <div id="skills-ui"></div>
        </div>
      </div>

      <!-- ПРАВАЯ ПАНЕЛЬ -->
      <div class="right-panel">
        <!-- Верхний ряд: персонаж + блок боя -->
        <div class="right-top-row" style="display: flex; gap: 2px; margin-bottom: 2px; height: 280px;">
          <!-- Блок персонаж -->
          <div class="card" style="flex: 1; overflow-y: auto;">
            <h2><i class="fas fa-user"></i> <span id="player-header">Герой [Ур. 1]</span></h2>
            <div class="character-info">
              <div class="stat-row"><span class="stat-label">Здоровье:</span><span id="player-health" class="stat-value">100/100</span></div>
              <div class="health-bar"><div id="health-bar" class="health-fill"></div></div>
              <div class="stat-row"><span class="stat-label">Мана:</span><span id="player-mana" class="stat-value">50/50</span></div>
              <div class="mana-bar"><div id="mana-bar" class="mana-fill"></div></div>
              <div class="stat-row"><span class="stat-label">Выносливость:</span><span id="player-stamina" class="stat-value">100/100</span></div>
              <div class="stamina-bar"><div id="stamina-bar" class="stamina-fill"></div></div>
              <div class="stat-row"><span class="stat-label">Опыт:</span><span id="player-exp" class="stat-value">0/50</span></div>
              <div class="stat-row"><span class="stat-label">Золото:</span><span id="player-gold" class="stat-value gold-text">50 <i class="fas fa-coins gold-icon"></i></span></div>
            </div>
          </div>

          <!-- Блок боя -->
          <div id="battle-ui" class="card battle-card" style="flex: 1; overflow-y: auto;">
            <h2><i class="fas fa-fist-raised"></i> Бой</h2>
            <div class="enemy-info">
              <h3 id="enemy-name">-</h3>
              <div class="enemy-health">Здоровье: <span id="enemy-health">-/-</span></div>
            </div>
            <div class="battle-actions">
              <button id="attack-btn" class="btn btn-danger"><i class="fas fa-swords"></i> Атаковать</button>
              <button id="skills-btn" class="battle-btn"><i class="fas fa-shield-alt"></i>Умения</button>
              <button id="spells-btn" class="battle-btn"><i class="fas fa-shield-alt"></i>Заклинания</button>
              <button id="escape-btn" class="btn btn-warning"><i class="fas fa-running"></i> Бежать</button>
            </div>
          </div>
        </div>

        <!-- Лог -->
        <div class="card" style="margin-bottom: 1px;">
          <div id="log-content" class="log-content" style="height: 220px; overflow-y: auto;">
            <div class="log-entry">🏰 Добро пожаловать в RPG!</div>
          </div>
        </div>

        <!-- Время и кнопки -->
        <div style="display: flex; gap: 1px;">
          <div class="card" style="flex: 1;">
            <div id="time-ui">08:37 | День 1 | 🌱 Весна</div>
          </div>
          <div class="card" style="flex: 1;">
            <div class="game-controls" style="text-align: right;">
              <button id="new-game-btn" title="Новая игра"><i class="fas fa-plus-circle"></i></button>
              <button id="save-btn" title="Сохранить"><i class="fas fa-save"></i></button>
              <button id="load-btn" title="Загрузить"><i class="fas fa-folder-open"></i></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div id="character-creation-container" style="display: none;"></div>
  <script type="module" src="main.js"></script>
</body>
</html>
